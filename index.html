<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> عيدية حبيب قلبي❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Intro Screen */
        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1.5s ease-out, transform 1.5s ease-out;
        }

        .intro-screen.hidden {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        .intro-text {
            color: #000000;
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 3rem;
            text-align: center;
            text-shadow: none;
            animation: fadeInUp 1s ease-out;
        }

        .enter-button {
            background: #ffb3c1;
            color: #000000;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 179, 193, 0.3);
            animation: pulse 2s infinite;
            font-weight: 500;
        }

        .enter-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 179, 193, 0.4);
            background: #ffccd5;
        }

        /* Main Content */
        .main-content {
            opacity: 0;
            transition: opacity 1.5s ease-in;
            min-height: 100vh;
            position: relative;
        }

        .main-content.visible {
            opacity: 1;
        }

        /* Floating Hearts Background */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: fixed;
            color: rgba(255, 179, 193, 0.6);
            animation: float 4s ease-in-out infinite;
            font-size: 20px;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Love Message Section */
        .love-message-section {
            padding: 60px 20px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .typing-container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffb3c1;
            backdrop-filter: none;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(255, 179, 193, 0.2);
            border: 1px solid rgba(255, 179, 193, 0.3);
        }

        .typing-text {
            color: #000000;
            font-size: 1.8rem;
            line-height: 2.5;
            font-weight: 300;
            text-shadow: none;
            min-height: 200px;
        }

        .typing-text span {
            opacity: 0;
            animation: fadeInChar 0.5s ease-in forwards;
        }

        @keyframes fadeInChar {
            to {
                opacity: 1;
            }
        }

        /* Photo Gallery Section */
        .gallery-section {
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        .section-title {
            text-align: center;
            color: #000000;
            font-size: 2.5rem;
            margin-bottom: 40px;
            font-weight: 300;
            text-shadow: none;
        }

        .gallery-grid {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            padding: 20px;
        }

        .gallery-item {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            background: #ffb3c1;
            backdrop-filter: none;
            transition: all 0.3s ease;
            cursor: pointer;
            aspect-ratio: 1;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 179, 193, 0.3);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        /* Final Section */
        .final-section {
            padding: 60px 20px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .final-message {
            max-width: 600px;
            margin: 0 auto;
            background: #ffb3c1;
            backdrop-filter: none;
            border-radius: 20px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 179, 193, 0.3);
            animation: glow 3s ease-in-out infinite;
        }

        .final-text {
            color: #000000;
            font-size: 2rem;
            line-height: 1.8;
            font-weight: 300;
            text-shadow: 0 2px 15px rgba(139, 33, 19, 0.3);
            animation: fadeInUp 2s ease-out;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(255, 179, 193, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(255, 179, 193, 0.5);
            }
        }

        /* Particle Effect */
        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(255, 179, 193, 0.8) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat 8s ease-in-out infinite;
        }

        @keyframes particleFloat {
            0%, 100% {
                transform: translateY(0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-50px) scale(0.5);
                opacity: 0;
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .intro-text {
                font-size: 2rem;
            }

            .typing-text {
                font-size: 1.4rem;
            }

            .section-title {
                font-size: 2rem;
            }

            .final-text {
                font-size: 1.6rem;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .typing-container {
                padding: 40px 20px;
            }

            .final-message {
                padding: 40px 20px;
            }
        }

        @media (max-width: 480px) {
            .intro-text {
                font-size: 1.5rem;
            }

            .typing-text {
                font-size: 1.2rem;
            }

            .enter-button {
                padding: 15px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Intro Screen -->
    <div class="intro-screen" id="introScreen">
        <h1 class="intro-text">جاهز للعيدية؟</h1>
        <button class="enter-button" onclick="enterExperience()"> يلا مستني ايه؟!❤️</button>
    </div>

    <!-- Floating Hearts Background -->
    <div class="floating-hearts" id="floatingHearts"></div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <!-- Love Message Section -->
        <section class="love-message-section">
            <div class="typing-container">
                <div class="typing-text" id="typingText"></div>
            </div>
        </section>

        <!-- Photo Gallery Section -->
        <section class="gallery-section">
            <h2 class="section-title"> ذكراياتنا📸❤️</h2>
            <div class="gallery-grid" id="galleryGrid">
                <!-- Gallery items will be generated by JavaScript -->
            </div>
        </section>

        <!-- Final Section -->
        <section class="final-section">
            <div class="final-message">
                <p class="final-text">دي بس البداية... وكل عيد وإنت معايا ❤️</p>
            </div>
        </section>
    </div>

    <script>
        // Arabic love message for typing effect
        const loveMessage = [
            "كل عيد وإنت معايا يا قلبي ❤️",
            "ياأجمل حاجة في حياتي",
            "وجودك جنبي هو الأمان والسعادة",
            "وإن شاء الله السنة الجاية نكون في بيتنا ",
            "وكل عيد وإنت حبيبي وكل دنيتي ❤️"
        ];

        // Placeholder images for gallery (you can replace these)
        const placeholderImages = [
            "1.JPG",
            "2 (1).jpg", 
            "3 (1).jpg",
            "4 (1).jpg",
            "5 (1).jpg",
            "6 (1).jpg"
        ];

        // Enter experience function
        function enterExperience() {
            const introScreen = document.getElementById('introScreen');
            const mainContent = document.getElementById('mainContent');
            
            // Hide intro screen
            introScreen.classList.add('hidden');
            
            // Show main content after a short delay
            setTimeout(() => {
                mainContent.classList.add('visible');
                startFloatingHearts();
                startTypingEffect();
                createGallery();
                createParticles();
            }, 500);
        }

        // Create floating hearts
        function startFloatingHearts() {
            const container = document.getElementById('floatingHearts');
            
            // Create multiple hearts
            for (let i = 0; i < 25; i++) {
                setTimeout(() => {
                    createHeart(container);
                }, i * 400);
            }
            
            // Continue creating hearts
            setInterval(() => {
                createHeart(container);
            }, 1500);
        }

        function createHeart(container) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.top = Math.random() * 100 + '%';
            heart.style.animationDelay = Math.random() * 2 + 's';
            heart.style.fontSize = (Math.random() * 25 + 10) + 'px';
            
            container.appendChild(heart);
            
            // Remove heart after animation
            setTimeout(() => {
                heart.remove();
            }, 4000);
        }

        // Typing effect for love message
        function startTypingEffect() {
            const typingText = document.getElementById('typingText');
            let lineIndex = 0;
            let charIndex = 0;
            
            function typeLine() {
                if (lineIndex >= loveMessage.length) {
                    return; // All lines typed
                }
                
                const currentLine = loveMessage[lineIndex];
                
                if (charIndex === 0) {
                    // Create new line element
                    const lineElement = document.createElement('div');
                    lineElement.style.marginBottom = '20px';
                    typingText.appendChild(lineElement);
                }
                
                const lineElement = typingText.lastElementChild;
                
                if (charIndex < currentLine.length) {
                    const span = document.createElement('span');
                    span.textContent = currentLine[charIndex];
                    span.style.animationDelay = (charIndex * 0.02) + 's';
                    lineElement.appendChild(span);
                    
                    charIndex++;
                    setTimeout(typeLine, 25);
                } else {
                    // Move to next line
                    lineIndex++;
                    charIndex = 0;
                    setTimeout(typeLine, 800);
                }
            }
            
            typeLine();
        }

        // Create photo gallery
        function createGallery() {
            const galleryGrid = document.getElementById('galleryGrid');
            
            placeholderImages.forEach((imageUrl, index) => {
                const galleryItem = document.createElement('div');
                galleryItem.className = 'gallery-item';
                galleryItem.style.animationDelay = (index * 0.2) + 's';
                galleryItem.style.animation = 'fadeInUp 1s ease-out forwards';
                
                // Create loading placeholder
                const loadingDiv = document.createElement('div');
                loadingDiv.style.cssText = `
                    position: absolute;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: #ffb3c1;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    color: #000;
                    font-size: 1.2rem;
                    z-index: 1;
                `;
                loadingDiv.textContent = 'Loading...';
                
                const img = document.createElement('img');
                img.style.cssText = 'opacity: 0; transition: opacity 0.5s ease;';
                img.src = imageUrl;
                img.alt = `ذكرة ${index + 1}`;
                img.loading = 'lazy';
                
                // Handle image load
                img.onload = function() {
                    loadingDiv.style.display = 'none';
                    img.style.opacity = '1';
                };
                
                // Handle image error
                img.onerror = function() {
                    loadingDiv.textContent = 'Failed to load';
                    loadingDiv.style.color = '#ff0000';
                };
                
                galleryItem.appendChild(loadingDiv);
                galleryItem.appendChild(img);
                galleryGrid.appendChild(galleryItem);
            });
        }

        // Create particle effects
        function createParticles() {
            const mainContent = document.getElementById('mainContent');
            
            setInterval(() => {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Random size and position
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.bottom = '0';
                particle.style.animationDelay = Math.random() * 2 + 's';
                particle.style.animationDuration = (Math.random() * 4 + 6) + 's';
                
                mainContent.appendChild(particle);
                
                // Remove particle after animation
                setTimeout(() => {
                    particle.remove();
                }, 10000);
            }, 2000);
        }

        // Add smooth scroll behavior
        document.addEventListener('DOMContentLoaded', function() {
            // Prevent any default scroll behavior
            document.documentElement.style.scrollBehavior = 'smooth';
        });

        // Add interactive hover effect for gallery items
        document.addEventListener('DOMContentLoaded', function() {
            // Gallery items will be created dynamically, so we use event delegation
            document.addEventListener('mouseover', function(e) {
                if (e.target.closest('.gallery-item')) {
                    const item = e.target.closest('.gallery-item');
                    item.style.transform = 'scale(1.05) rotate(1deg)';
                }
            });
            
            document.addEventListener('mouseout', function(e) {
                if (e.target.closest('.gallery-item')) {
                    const item = e.target.closest('.gallery-item');
                    item.style.transform = 'scale(1) rotate(0deg)';
                }
            });
        });
    </script>
</body>
</html>
